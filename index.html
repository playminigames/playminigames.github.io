<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMiniGames | Play mini games online for free | No ads, no hidden costs!</title>
    <style>
        /* --- Reset & Core Styling --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding-bottom: 60px;
        }

        /* --- Header / Navigation --- */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 5%;
            background-color: #1e293b;
            border-bottom: 2px solid #334155;
            gap: 20px;
        }

        @media(min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #38bdf8;
            cursor: pointer;
        }

        /* --- Search Bar --- */
        .search-container {
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background-color: #0f172a;
            border: 2px solid #334155;
            border-radius: 30px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* --- Categories Feature --- */
        .categories-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 5%;
            flex-wrap: wrap;
        }

        .category-btn {
            background-color: #1e293b;
            color: #94a3b8;
            border: 2px solid #334155;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .category-btn:hover, .category-btn.active {
            background-color: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        /* --- Game Grid Layout --- */
        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 5%;
        }

        /* --- Square Game Cards --- */
        .game-card {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            aspect-ratio: 1 / 1; /* Makes the card perfectly square */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.15);
        }

        .game-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .game-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .game-tag {
            font-size: 0.8rem;
            background-color: #334155;
            color: #94a3b8;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* --- No Results Message --- */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 40px;
            color: #94a3b8;
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="resetFilters()">🎮 Arcade Central</div>
        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Search games..." oninput="filterGames()">
        </div>
    </header>

    <div class="categories-container">
        <button class="category-btn active" onclick="filterCategory('all', this)">All Games</button>
        <button class="category-btn" onclick="filterCategory('puzzle', this)">Puzzle</button>
        <button class="category-btn" onclick="filterCategory('action', this)">Action</button>
        <button class="category-btn" onclick="filterCategory('retro', this)">Retro</button>
    </div>

    <main class="game-container" id="gameGrid">
        
        <a href="https://playminigames.github.io/neonmerge/" target="_blank" class="game-card" data-title="neon merge" data-category="puzzle">
            <div class="game-icon">🍎</div>
            <div class="game-title">Neon Merge</div>
            <div class="game-tag">Puzzle</div>
        </a>

        <a href="https://playminigames.github.io/spaceinvaders/" target="_blank" class="game-card" data-title="space invaders" data-category="action">
            <div class="game-icon">🚀</div>
            <div class="game-title">Space Invaders</div>
            <div class="game-tag">Action</div>
        </a>

        <a href="https://example.com/snake" target="_blank" class="game-card" data-title="retro snake" data-category="retro">
            <div class="game-icon">🐍</div>
            <div class="game-title">Retro Snake</div>
            <div class="game-tag">Retro</div>
        </a>

        <a href="https://example.com/pong" target="_blank" class="game-card" data-title="classic pong" data-category="retro">
            <div class="game-icon">🏓</div>
            <div class="game-title">Classic Pong</div>
            <div class="game-tag">Retro</div>
        </a>

        <div class="no-results" id="noResults">No games match your filters.</div>

    </main>

    <script>
        let currentCategory = 'all';

        function filterGames() {
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.querySelectorAll('.game-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const title = card.getAttribute('data-title');
                const category = card.getAttribute('data-category');

                const matchesSearch = title.includes(searchQuery);
                const matchesCategory = (currentCategory === 'all' || category === currentCategory);

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Display "No Results" message if everything is filtered out
            const noResults = document.getElementById('noResults');
            if (visibleCount === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        }

        function filterCategory(category, buttonElement) {
            currentCategory = category;

            // Toggle active visual class on category tabs
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            filterGames();
        }

        function resetFilters() {
            document.getElementById('searchBar').value = '';
            const allBtn = document.querySelector('.category-btn');
            filterCategory('all', allBtn);
        }
    </script>
</body>
</html>
